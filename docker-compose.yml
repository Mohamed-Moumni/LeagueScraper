version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leaguescraper
    ports:
      - "8000:8000"
    environment:
      - BASE_URL=${BASE_URL:-https://www.sofascore.com}
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

